name: azsdk-common-apiview-feedback-resolution-eval
description: Evaluation suite for APIView feedback resolution skill.
skill: azsdk-common-apiview-feedback-resolution
version: "1.0"
config:
  model: gpt-4o
  executor: mock
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
graders:
  - type: text
    name: mentions_apiview
    config:
      contains: ["APIView", "feedback", "comment"]
  - type: text
    name: references_tools
    config:
      regex_match: "(?i)(azsdk_apiview_get_comments|azsdk_typespec_delegate_apiview_feedback|APIView)"
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 50"
tasks:
  - "tasks/*.yaml"
