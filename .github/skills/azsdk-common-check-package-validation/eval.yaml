name: azsdk-common-check-package-validation-eval
description: Evaluation suite for package validation skill.
skill: azsdk-common-check-package-validation
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
graders:
  - type: text
    name: mentions_validation_concepts
    config:
      contains: ["validation", "check", "package"]
  - type: text
    name: references_tools
    config:
      regex_match: "(?i)(azsdk_package_run_check|validation|lint|format|changelog)"
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 50"
tasks:
  - "tasks/*.yaml"
