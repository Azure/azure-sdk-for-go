name: azsdk-common-generate-sdk-locally-eval
description: Evaluation suite for local SDK generation skill.
skill: azsdk-common-generate-sdk-locally
version: '1.0'
config:
  model: gpt-4o
  executor: mock
  trials_per_task: 1
  timeout_seconds: 600
  parallel: false
graders:
- type: regex
  name: no_fatal_errors
  config:
    must_not_match:
    - (?i)error occurred
    - (?i)failed
    - (?i)re-run the tool
tasks:
- tasks/*.yaml
