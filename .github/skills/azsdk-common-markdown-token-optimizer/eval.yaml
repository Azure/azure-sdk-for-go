name: azsdk-common-markdown-token-optimizer-eval
description: Evaluation suite for markdown token optimizer skill.
skill: azsdk-common-markdown-token-optimizer
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
graders:
  - type: keyword
    name: mentions_optimization_concepts
    config:
      keywords: ["token", "markdown", "optimize", "reduce", "compression"]
      must_include_all: false
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 50"
tasks:
  - "tasks/*.yaml"
