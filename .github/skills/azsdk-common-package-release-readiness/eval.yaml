name: azsdk-common-package-release-readiness-eval
description: Evaluation suite for package release readiness skill.
skill: azsdk-common-package-release-readiness
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 600
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
graders:
  - type: text
    name: mentions_release_concepts
    config:
      contains: ["release", "package", "readiness"]
  - type: text
    name: references_tools
    config:
      regex_match: "(?i)(azsdk_release_sdk|azsdk_package_run_check|changelog|validation)"
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 50"
tasks:
  - "tasks/*.yaml"
