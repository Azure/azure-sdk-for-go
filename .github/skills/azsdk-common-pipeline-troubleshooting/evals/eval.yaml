name: azsdk-common-pipeline-troubleshooting-evals
description: Evaluations for the pipeline troubleshooting skill
skill: azsdk-common-pipeline-troubleshooting
config:
  timeout: 60
graders:
- type: regex
  name: no_fatal_errors
  config:
    must_not_match:
    - (?i)fatal error
    - (?i)unhandled exception
    - '(?i)panic:'
tasks: tasks/*.yaml
