name: azsdk-common-prepare-release-plan-eval
description: Evaluation suite for release plan management skill.
skill: azsdk-common-prepare-release-plan
version: '1.0'
config:
  model: gpt-4o
  executor: mock
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
graders:
- type: regex
  name: no_fatal_errors
  config:
    must_not_match:
    - (?i)fatal error
    - (?i)unhandled exception
    - '(?i)panic:'
tasks:
  - "tasks/*.yaml"
