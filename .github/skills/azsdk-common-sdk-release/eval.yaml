name: azsdk-common-sdk-release-eval
description: Evaluation suite for SDK release skill.
skill: azsdk-common-sdk-release
version: '1.0'
config:
  model: gpt-4o
  executor: mock
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
graders:
- type: regex
  name: no_fatal_errors
  config:
    must_not_match:
    - (?i)fatal error
    - (?i)unhandled exception
    - '(?i)panic:'
tasks:
- tasks/*.yaml
