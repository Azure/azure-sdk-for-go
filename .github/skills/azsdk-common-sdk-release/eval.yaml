name: azsdk-common-sdk-release-eval
description: Evaluation suite for SDK release skill.
skill: azsdk-common-sdk-release
version: '1.0'
config:
  model: gpt-4o
  executor: mock
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
graders:
- type: regex
  name: mentions_release_concepts
  config:
    must_match:
    - "(?i)release"
    - "(?i)pipeline"
    - "(?i)azsdk_release_sdk"
- type: regex
  name: references_tools
  config:
    must_match:
    - "(?i)(azsdk_release_sdk|release.*pipeline|check.*ready|trigger.*release)"
- type: code
  name: has_substantive_output
  config:
    assertions:
    - len(output) > 50
tasks:
- tasks/*.yaml
