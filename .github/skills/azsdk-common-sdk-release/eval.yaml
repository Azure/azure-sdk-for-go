name: azsdk-common-sdk-release-eval
description: Evaluation suite for SDK release skill.
skill: azsdk-common-sdk-release
version: "1.0"
config:
  model: gpt-4o
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
graders:
  - type: text
    name: mentions_release_concepts
    config:
      contains: ["release", "pipeline", "azsdk_release_sdk"]
  - type: text
    name: references_tools
    config:
      regex_match: "(?i)(azsdk_release_sdk|release.*pipeline|check.*ready|trigger.*release)"
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 50"
tasks:
  - "tasks/*.yaml"
