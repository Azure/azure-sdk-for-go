name: azsdk-common-sdk-release-evals
description: Evaluations for the SDK release skill
skill: azsdk-common-sdk-release
config:
  timeout: 60
graders:
- type: regex
  name: no_fatal_errors
  config:
    must_not_match:
    - (?i)fatal error
    - (?i)unhandled exception
    - '(?i)panic:'
tasks:
  - "tasks/*.yaml"
