name: azsdk-common-sensei-eval
description: Evaluation suite for sensei skill improvement skill.
skill: azsdk-common-sensei
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
graders:
  - type: text
    name: mentions_skill_concepts
    config:
      contains: ["skill", "frontmatter", "token", "improve", "compliance"]
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 50"
tasks:
  - "tasks/*.yaml"
