name: azsdk-common-skill-authoring-eval
description: Evaluation suite for skill authoring skill.
skill: azsdk-common-skill-authoring
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
graders:
  - type: keyword
    name: mentions_authoring_concepts
    config:
      keywords: ["skill", "authoring", "frontmatter", "guidelines", "structure"]
      must_include_all: false
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 50"
tasks:
  - "tasks/*.yaml"
