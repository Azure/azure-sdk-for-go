name: azsdk-common-validate-codeowners-eval
description: Evaluation suite for CODEOWNERS validation skill.
skill: azsdk-common-validate-codeowners
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
graders:
  - type: text
    name: mentions_codeowners_concepts
    config:
      contains: ["CODEOWNERS", "owners", "validate"]
  - type: text
    name: references_tools
    config:
      regex_match: "(?i)(azsdk_engsys_validate_codeowners_entry_for_service|CODEOWNERS|code.owners)"
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 50"
tasks:
  - "tasks/*.yaml"
