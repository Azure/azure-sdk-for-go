name: azsdk-common-validate-service-label-eval
description: Evaluation suite for service label validation skill.
skill: azsdk-common-validate-service-label
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
graders:
  - type: text
    name: mentions_label_concepts
    config:
      contains: ["service label", "label", "check"]
  - type: text
    name: references_tools
    config:
      regex_match: "(?i)(azsdk_check_service_label|service.label|create.*label)"
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 50"
tasks:
  - "tasks/*.yaml"
