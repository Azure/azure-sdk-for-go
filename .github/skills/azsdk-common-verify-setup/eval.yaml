name: azsdk-common-verify-setup-eval
description: Evaluation suite for environment verification skill.
skill: azsdk-common-verify-setup
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
graders:
  - type: text
    name: mentions_setup_concepts
    config:
      contains: ["verify", "setup", "environment"]
  - type: text
    name: references_tools
    config:
      regex_match: "(?i)(azsdk_verify_setup|environment|requirements|missing.*tool)"
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 50"
tasks:
  - "tasks/*.yaml"
